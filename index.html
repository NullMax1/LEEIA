<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NULLX AI SYSTEM v4.1</title>
<style>
:root{--bg:#0a0a0a;--panel:#121212;--darker:#050505;--accent:#b0b0b0;--accent-dark:#7a7a7a;--text:#e8e8e8;--text2:#aaaaaa;--user-msg:#1c1c1c}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI'}
body{display:flex;flex-direction:column}
header{padding:20px;text-align:center;background:var(--panel);border-bottom:2px solid var(--accent-dark)}
#chat-container{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px}
.message{max-width:85%;padding:14px;border-radius:10px}
.user-message{align-self:flex-end;background:var(--user-msg)}
.ai-message{align-self:flex-start;background:var(--panel);border-left:4px solid var(--accent)}
.input-area{display:flex;padding:15px;background:var(--panel)}
input{flex:1;padding:14px;border-radius:30px;border:none;background:#000;color:#fff}
button{margin-left:10px;padding:14px;border:none;background:var(--accent);border-radius:50%;cursor:pointer}
.thinking{opacity:.7;font-style:italic}
</style>
</head>
<body>
<header><h2>NULLX AI SYSTEM</h2></header>
<div id="chat-container"></div>
<div class="input-area">
<input id="user-input" placeholder="Habla con el vacío...">
<button onclick="sendMessage()">➤</button>
</div>
<script>
// ⚠️ YA NO VA API KEY AQUÍ
// AHORA SE USA TU BACKEND DE RENDER
const API_URL = "https://leeia.onrender.com";const chat=document.getElementById("chat-container"); const input=document.getElementById("user-input");

function addMessage(text,cls){ const div=document.createElement("div"); div.className="message "+cls; div.innerHTML=text.replace(/\n/g,"<br>"); chat.appendChild(div); chat.scrollTop=chat.scrollHeight; }

async function sendMessage(){ const text=input.value.trim(); if(!text)return;

addMessage(text,"user-message"); input.value="";

const thinking=document.createElement("div"); thinking.className="message ai-message thinking"; thinking.innerText="El eco responde..."; chat.appendChild(thinking);

try{ const res=await fetch(API_URL,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({message:text}) });

const data=await res.json();
thinking.remove();

const response=data.choices?.[0]?.message?.content || "Silencio en la oscuridad...";
addMessage(response,"ai-message");

}catch(e){ thinking.innerText="La conexión se ha perdido en las sombras..."; } }

input.addEventListener("keypress",e=>{ if(e.key==="Enter")sendMessage(); });

window.onload=()=>{ setTimeout(()=>{ addMessage("NULLX v4.1 despierto.<br>En la penumbra, te escucho.","ai-message"); },500); }; </script>

</body>
</html>
