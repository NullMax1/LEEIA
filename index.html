<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NULLX AI SYSTEM</title>
<style>
:root {
    --bg:#0a0a0c;--panel:#141417;--accent:#00f2ff;--text:#e0e0e0;--user-msg:#1a1a2e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI';display:flex;flex-direction:column;height:100vh}
header{padding:15px;text-align:center;background:var(--panel);border-bottom:2px solid var(--accent)}
#chat-container{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.message{max-width:85%;padding:10px;border-radius:10px}
.user-message{align-self:flex-end;background:var(--user-msg)}
.ai-message{align-self:flex-start;background:var(--panel);border-left:3px solid var(--accent)}
.input-area{display:flex;padding:10px;background:var(--panel)}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#000;color:#fff}
button{margin-left:10px;padding:10px;border:none;background:var(--accent);border-radius:50%;cursor:pointer}
</style>
</head>
<body>
<header><h2>NULLX AI SYSTEM</h2></header>
<div id="chat-container"></div>
<div class="input-area">
<input id="user-input" placeholder="Escribe...">
<button onclick="sendMessage()">➤</button>
</div>
<script>
// ⚠️ PON TU API KEY AQUÍ (NO COMPARTIR)
const API_KEY = "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";const chat = document.getElementById("chat-container"); const input = document.getElementById("user-input");

function addMessage(text, cls){ const div=document.createElement("div"); div.className="message "+cls; div.innerText=text; chat.appendChild(div); chat.scrollTop=chat.scrollHeight; }

async function sendMessage(){ const text=input.value.trim(); if(!text)return;

addMessage(text,"user-message"); input.value="";

const thinking=document.createElement("div"); thinking.className="message ai-message"; thinking.innerText="Pensando..."; chat.appendChild(thinking);

try{ const res=await fetch("https://api.openai.com/v1/chat/completions",{ method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+API_KEY }, body:JSON.stringify({ model:"gpt-4o-mini", messages:[{role:"user",content:text}] }) });

const data=await res.json();
thinking.innerText=data.choices?.[0]?.message?.content || "Error";

}catch(e){ thinking.innerText="Error de conexión"; } }

input.addEventListener("keypress",e=>{ if(e.key==="Enter")sendMessage(); }); </script>

</body>
</html>
