<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NULLX AI SYSTEM</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141417;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --user-msg: #1a1a2e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Ajuste para que el cuerpo use todo el alto disponible en celular */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Usa dynamic viewport height para celulares */
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            background: var(--panel);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideIn 0.3s ease forwards;
            white-space: pre-wrap;
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid #303050;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--panel);
            border-left: 3px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* Contenedor de abajo fijo */
        .bottom-area {
            background: var(--panel);
            border-top: 1px solid #333;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); /* Para celulares modernos */
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 16px; /* Evita que el iPhone haga zoom al escribir */
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .typing {
            font-style: italic;
            font-size: 0.8rem;
            color: var(--accent);
            padding: 5px 20px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>NULLX AI SYSTEM</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">SISTEMA EN LÍNEA. Esperando comandos...</div>
    </div>

    <div class="bottom-area">
        <div id="typing-indicator" class="typing">IA procesando datos...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
    const API_KEY = "AIzaSyDmCQCgpN2Hygeh03nFyj1N_Qa3-5nSxwo";
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (text === "") return;

        addMessage(text, 'user-message');
        userInput.value = "";
        showTyping(true);

        try {
            // URL actualizada a la v1beta que es más estable para llaves gratuitas
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: text }]
                    }]
                })
            });

            const data = await response.json();

            // Si hay un error en la respuesta de Google, lo mostramos
            if (data.error) {
                showTyping(false);
                addMessage("ERROR DE GOOGLE: " + data.error.message, "ai-message");
                return;
            }

            if (data.candidates && data.candidates[0].content) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                showTyping(false);
                addMessage(aiResponse, 'ai-message');
            } else {
                showTyping(false);
                addMessage("ERROR: Respuesta vacía del servidor.", "ai-message");
            }
        } catch (error) {
            showTyping(false);
            addMessage("ERROR DE RED: No se pudo contactar con el sistema.", "ai-message");
            console.error(error);
        }
    }

    function addMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping(show) {
        typingIndicator.style.display = show ? 'block' : 'none';
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>
